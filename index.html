<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محلل السبوت | SMC Pro</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05080d;--bg2:#080e17;--bg3:#0c1520;--bg4:#101c2a;
  --bdr:#152030;--bdr2:#1a2d42;--bdr3:#1f3550;
  --acc:#00e5aa;--acc2:#00aaff;--acc3:#ff6b00;
  --bull:#00e676;--bear:#ff3060;--gold:#ffc400;
  --tx:#d4e8ff;--tx2:#6a90b8;--tx3:#2d4a65;
  --mono:'IBM Plex Mono',monospace;
  --ar:'Tajawal',sans-serif;
  --r:8px;--r-lg:12px;
  --shadow:0 4px 20px rgba(0,0,0,.3);
  --shadow-lg:0 8px 40px rgba(0,229,170,.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);color:var(--tx);
  font-family:var(--ar);min-height:100vh;
  background-image:
    radial-gradient(ellipse 80% 40% at 50% -10%,rgba(0,229,170,.04),transparent),
    linear-gradient(rgba(0,229,170,.015) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,170,.015) 1px,transparent 1px);
  background-size:auto,44px 44px,44px 44px;
}

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bdr3);border-radius:4px;transition:background .2s;}
::-webkit-scrollbar-thumb:hover{background:var(--acc);}

/* ══ HEADER ══ */
.hdr{
  position:sticky;top:0;z-index:1000;
  background:rgba(5,8,13,.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bdr);
  padding:14px 24px;
  display:flex;align-items:center;justify-content:space-between;
  gap:16px;flex-wrap:wrap;
  box-shadow:var(--shadow);
}
.logo{display:flex;align-items:center;gap:12px;}
.logo-mark{  width:42px;height:42px;border-radius:12px;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  display:flex;align-items:center;justify-content:center;
  font-size:20px;box-shadow:0 0 30px rgba(0,229,170,.35);
  transition:transform .3s,box-shadow .3s;
}
.logo-mark:hover{transform:scale(1.05) rotate(5deg);box-shadow:0 0 40px rgba(0,229,170,.5);}
.logo-text h1{
  font-size:18px;font-weight:800;letter-spacing:2px;
  background:linear-gradient(90deg,var(--acc),var(--acc2),var(--acc));
  background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:gradient 3s linear infinite;
}
@keyframes gradient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.logo-text p{font-size:11px;color:var(--tx2);font-family:var(--mono);letter-spacing:2px;margin-top:2px;}
.hdr-live{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;color:var(--tx2);background:var(--bg3);padding:6px 12px;border-radius:6px;border:1px solid var(--bdr2);}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--acc);animation:pulse 2s infinite;box-shadow:0 0 10px var(--acc);}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,229,170,.5);}50%{box-shadow:0 0 0 8px rgba(0,229,170,0);}}

/* ══ CONTROLS ══ */
.ctrl-wrap{
  padding:20px 24px;display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;
  background:linear-gradient(180deg,rgba(12,21,32,.8),transparent);
  border-bottom:1px solid var(--bdr);
}
.ctrl-g{display:flex;flex-direction:column;gap:6px;}
.ctrl-g label{font-size:11px;color:var(--tx2);font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;font-weight:600;}
.ctrl-g input,.ctrl-g select{
  background:var(--bg3);border:1px solid var(--bdr2);color:var(--tx);
  padding:12px 16px;border-radius:var(--r);font-family:var(--mono);font-size:14px;
  outline:none;transition:all .2s;cursor:pointer;min-width:140px;
}
.ctrl-g input:focus,.ctrl-g select:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(0,229,170,.15);background:var(--bg4);}
.ctrl-g select option{background:var(--bg3);color:var(--tx);}
.btn-analyze{
  background:linear-gradient(135deg,var(--acc),#00b88a);color:#000;
  border:none;padding:12px 32px;border-radius:var(--r);
  font-family:var(--ar);font-size:15px;font-weight:700;cursor:pointer;
  box-shadow:0 6px 25px rgba(0,229,170,.35);transition:all .25s;white-space:nowrap;height:44px;
  display:flex;align-items:center;gap:8px;
}
.btn-analyze:hover{transform:translateY(-2px);box-shadow:0 10px 35px rgba(0,229,170,.5);}
.btn-analyze:active{transform:translateY(0);}
.btn-analyze:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}

/* ══ QUICK COINS ══ */
.quick{display:flex;gap:8px;flex-wrap:wrap;padding:12px 24px 16px;background:var(--bg2);border-bottom:1px solid var(--bdr);}
.quick-label{font-size:11px;color:var(--tx3);font-family:var(--mono);line-height:32px;font-weight:600;}
.q-btn{
  background:var(--bg3);border:1px solid var(--bdr2);color:var(--tx2);  padding:6px 16px;border-radius:6px;font-family:var(--mono);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;
}
.q-btn:hover{border-color:var(--acc);color:var(--acc);background:rgba(0,229,170,.08);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,229,170,.15);}
.q-btn:active{transform:translateY(0);}
.q-kbd{font-size:9px;background:var(--bg4);padding:2px 5px;border-radius:3px;color:var(--tx3);font-family:var(--mono);}

/* ══ LOADING / ERROR ══ */
.loading{display:none;flex-direction:column;align-items:center;gap:16px;padding:80px;color:var(--tx2);font-family:var(--mono);font-size:13px;}
.spin{width:36px;height:36px;border:3px solid var(--bdr3);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;box-shadow:0 0 20px rgba(0,229,170,.2);}
@keyframes spin{to{transform:rotate(360deg);}}
.err-box{display:none;margin:20px 24px;background:rgba(255,48,96,.1);border:1px solid rgba(255,48,96,.3);border-radius:var(--r-lg);padding:20px;text-align:center;color:var(--bear);font-family:var(--mono);font-size:13px;box-shadow:0 4px 20px rgba(255,48,96,.1);}

/* ══ CONTENT LAYOUT ══ */
.content{padding:0 24px 40px;display:none;flex-direction:column;gap:20px;max-width:1800px;margin:0 auto;width:100%;}

/* ══ SIGNAL CARD ══ */
.signal-card{
  border-radius:16px;padding:28px;border:1px solid;
  background:var(--bg2);position:relative;overflow:hidden;
  box-shadow:var(--shadow);transition:transform .3s,box-shadow .3s;
}
.signal-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
.signal-card::before{
  content:'';position:absolute;inset:0;opacity:.05;
  background:radial-gradient(ellipse at 50% 0%,currentColor,transparent 70%);
}
.signal-card.bull-card{border-color:rgba(0,230,118,.4);color:var(--bull);}
.signal-card.bear-card{border-color:rgba(255,48,96,.4);color:var(--bear);}
.signal-card.wait-card{border-color:rgba(255,196,0,.3);color:var(--gold);}
.signal-card.none-card{border-color:var(--bdr2);color:var(--tx2);}
.sig-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:24px;}
.sig-badge{display:flex;align-items:center;gap:14px;}
.sig-icon{font-size:40px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.3));}
.sig-title{font-size:12px;color:var(--tx2);font-family:var(--mono);letter-spacing:2px;margin-bottom:4px;font-weight:600;}
.sig-label{font-size:26px;font-weight:900;letter-spacing:2px;}
.sig-count{font-family:var(--mono);text-align:left;}
.sig-num{font-size:40px;font-weight:800;line-height:1;}
.sig-num-lbl{font-size:11px;color:var(--tx2);letter-spacing:1px;font-weight:600;}

/* Trade Grid */
.trade-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:20px;padding-top:20px;border-top:1px solid var(--bdr);}
.trade-cell{background:var(--bg3);border-radius:10px;padding:14px 16px;border:1px solid var(--bdr);transition:all .2s;}
.trade-cell:hover{border-color:var(--acc);transform:translateY(-1px);box-shadow:0 4px 15px rgba(0,229,170,.1);}
.tc-lbl{font-size:10px;color:var(--tx3);font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;font-weight:600;}
.tc-val{font-size:15px;font-family:var(--mono);font-weight:700;}
.tc-sub{font-size:10px;color:var(--tx2);font-family:var(--mono);margin-top:4px;}
.tc-entry{border-color:rgba(0,229,170,.3)!important;}.tc-entry .tc-val{color:var(--acc);}
.tc-sl{border-color:rgba(255,48,96,.3)!important;}.tc-sl .tc-val{color:var(--bear);}
.tc-tp1{border-color:rgba(0,230,118,.2)!important;}.tc-tp1 .tc-val{color:var(--bull);}.tc-tp2{border-color:rgba(0,230,118,.25)!important;}.tc-tp2 .tc-val{color:var(--bull);}
.tc-tp3{border-color:rgba(0,230,118,.3)!important;}.tc-tp3 .tc-val{color:#00ff99;}

/* ══ PRICE HERO ══ */
.price-hero{background:var(--bg2);border:1px solid var(--bdr2);border-radius:16px;padding:24px;box-shadow:var(--shadow);}
.ph-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.ph-sym{display:flex;align-items:center;gap:14px;}
.ph-icon{width:52px;height:52px;background:var(--bg4);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid var(--bdr2);box-shadow:0 4px 15px rgba(0,0,0,.2);}
.ph-name{font-family:var(--mono);font-size:22px;font-weight:700;letter-spacing:2px;}
.ph-tf{font-size:11px;color:var(--tx2);font-family:var(--mono);margin-top:3px;background:var(--bg3);padding:3px 10px;border-radius:4px;display:inline-block;}
.ph-price{text-align:left;}
.ph-main{font-size:34px;font-family:var(--mono);font-weight:700;line-height:1;}
.ph-chg{font-size:15px;font-family:var(--mono);margin-top:4px;font-weight:600;}
.ph-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:20px;padding-top:20px;border-top:1px solid var(--bdr);}
.ph-stat .s-lbl{font-size:10px;color:var(--tx3);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;font-weight:600;}
.ph-stat .s-val{font-size:14px;font-family:var(--mono);font-weight:600;}

/* ══ INDICATORS GRID ══ */
.ind-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.ind-card{background:var(--bg2);border:1px solid var(--bdr2);border-radius:12px;padding:16px;transition:all .25s;position:relative;overflow:hidden;}
.ind-card:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,229,170,.12);}
.ind-card::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(0,229,170,.02));pointer-events:none;}
.ind-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--bdr);}
.ind-name{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:1px;color:var(--tx2);}
.ind-sig{font-size:11px;padding:3px 12px;border-radius:5px;font-family:var(--mono);font-weight:700;letter-spacing:1px;}
.sig-bull{background:rgba(0,230,118,.15);color:var(--bull);}
.sig-bear{background:rgba(255,48,96,.15);color:var(--bear);}
.sig-neut{background:rgba(106,144,184,.12);color:var(--tx2);}
.ind-vals{display:flex;flex-direction:column;gap:6px;}
.ind-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;}
.ir-lbl{font-size:11px;color:var(--tx3);font-family:var(--mono);}
.ir-val{font-size:12px;font-family:var(--mono);font-weight:600;}
.ind-bar{height:4px;border-radius:3px;background:var(--bg4);margin-top:8px;overflow:hidden;}
.ind-fill{height:100%;border-radius:3px;transition:width 1s ease-out;}

/* ══ RECOMMENDATION CARD ══ */
.rec-card{border-radius:16px;padding:24px;border:1px solid var(--bdr2);background:var(--bg2);box-shadow:var(--shadow);}
.rec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--bdr);}
.rec-title{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx2);}
.rec-action{font-size:20px;font-weight:900;padding:8px 20px;border-radius:8px;font-family:var(--ar);box-shadow:0 4px 15px rgba(0,0,0,.2);}
.rec-action.buy{background:linear-gradient(135deg,rgba(0,230,118,.2),rgba(0,230,118,.1));color:var(--bull);border:1px solid rgba(0,230,118,.3);}
.rec-action.wait{background:linear-gradient(135deg,rgba(255,196,0,.2),rgba(255,196,0,.1));color:var(--gold);border:1px solid rgba(255,196,0,.3);}
.rec-action.avoid{background:linear-gradient(135deg,rgba(255,48,96,.2),rgba(255,48,96,.1));color:var(--bear);border:1px solid rgba(255,48,96,.3);}
.rec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.rec-box{background:var(--bg3);border-radius:10px;padding:16px;text-align:center;border:1px solid var(--bdr);transition:all .2s;}
.rec-box:hover{border-color:var(--acc);transform:translateY(-2px);}
.rec-box-lbl{font-size:10px;color:var(--tx3);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-weight:600;}
.rec-box-val{font-size:16px;font-family:var(--mono);font-weight:700;}
.rec-box-sub{font-size:10px;font-family:var(--mono);margin-top:4px;}
.rec-rr{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--bg3);border-radius:10px;margin-bottom:16px;border-right:4px solid var(--acc);}.rr-lbl{font-size:11px;color:var(--tx2);font-family:var(--mono);font-weight:600;}
.rr-val{font-size:15px;font-family:var(--mono);font-weight:700;color:var(--acc);}
.rr-bar{flex:1;height:6px;background:var(--bg4);border-radius:4px;overflow:hidden;}
.rr-fill{height:100%;border-radius:4px;transition:width .6s ease-out;}
.rec-note{font-size:12px;color:var(--tx2);font-family:var(--mono);line-height:1.7;padding:16px;background:var(--bg4);border-radius:10px;border:1px solid var(--bdr);}
.rec-conf{display:flex;align-items:center;gap:8px;margin-top:12px;}
.conf-dot{width:10px;height:10px;border-radius:50%;}
.conf-txt{font-size:11px;font-family:var(--mono);color:var(--tx2);}

/* ══ TWO COLUMN LAYOUT ══ */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.card{background:var(--bg2);border:1px solid var(--bdr2);border-radius:14px;padding:20px;transition:all .25s;}
.card:hover{border-color:var(--acc);box-shadow:0 8px 25px rgba(0,229,170,.1);}
.card-hdr{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--bdr);}
.c-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.c-title{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.level-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;background:var(--bg3);border-right:4px solid;margin-bottom:6px;transition:all .2s;}
.level-row:hover{transform:translateX(-3px);background:var(--bg4);}
.l-lbl{font-size:11px;color:var(--tx2);font-family:var(--mono);flex:1;font-weight:500;}
.l-val{font-family:var(--mono);font-size:13px;font-weight:700;}
.l-pct{font-size:10px;font-family:var(--mono);font-weight:600;}
.zone-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-radius:9px;background:var(--bg3);border-right:4px solid;margin-bottom:8px;transition:all .2s;}
.zone-row:hover{transform:translateX(-3px);background:var(--bg4);}
.z-lbl{font-size:11px;color:var(--tx2);font-family:var(--mono);font-weight:500;}
.z-rng{font-size:12px;font-family:var(--mono);font-weight:600;margin-top:2px;}
.z-tag{font-size:10px;padding:3px 10px;border-radius:4px;font-family:var(--mono);font-weight:700;}
.sw-flow{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;}
.sw-node{padding:4px 12px;border-radius:5px;font-size:11px;font-family:var(--mono);font-weight:700;}
.sw-arr{color:var(--tx3);font-size:12px;}
.sn-HH{background:rgba(0,230,118,.15);color:var(--bull);}
.sn-HL{background:rgba(0,230,118,.08);color:#00a050;}
.sn-LL{background:rgba(255,48,96,.15);color:var(--bear);}
.sn-LH{background:rgba(255,48,96,.08);color:#cc1844;}
.pa-card{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:9px;background:var(--bg3);border:1px solid var(--bdr);margin-bottom:8px;transition:all .2s;}
.pa-card:hover{border-color:var(--acc);transform:translateX(-3px);}
.pa-e{font-size:24px;}
.pa-body{flex:1;}
.pa-name{font-size:13px;font-weight:700;margin-bottom:2px;}
.pa-desc{font-size:11px;color:var(--tx2);font-family:var(--mono);}

/* ══ AGGREGATE PANEL ══ */
.agg-panel{background:var(--bg2);border:1px solid var(--bdr2);border-radius:16px;padding:24px;box-shadow:var(--shadow);}
.agg-title{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx2);margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.agg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.agg-item{background:var(--bg3);border-radius:9px;padding:12px 10px;text-align:center;border:1px solid var(--bdr);transition:all .2s;cursor:pointer;}
.agg-item:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:0 4px 15px rgba(0,229,170,.1);}
.agg-item-name{font-size:10px;font-family:var(--mono);color:var(--tx2);margin-bottom:5px;letter-spacing:.5px;font-weight:600;}
.agg-item-sig{font-size:11px;font-family:var(--mono);font-weight:700;padding:3px 8px;border-radius:4px;}
.agg-bar-wrap{margin-top:18px;padding-top:18px;border-top:1px solid var(--bdr);}
.agg-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}.agg-bar-lbl{font-size:11px;font-family:var(--mono);width:55px;color:var(--tx2);font-weight:600;}
.agg-bar-track{flex:1;height:8px;background:var(--bg4);border-radius:5px;overflow:hidden;}
.agg-bar-fill{height:100%;border-radius:5px;transition:width 1s ease-out;}
.agg-bar-cnt{font-size:11px;font-family:var(--mono);width:25px;text-align:right;font-weight:700;}

/* ══ TRADINGVIEW CHART ══ */
.chart-card{background:var(--bg2);border:1px solid var(--bdr2);border-radius:16px;padding:20px;box-shadow:var(--shadow);}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--bdr);}
.chart-title{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx2);}
.chart-tv{width:100%;height:550px;border-radius:12px;overflow:hidden;background:var(--bg3);border:1px solid var(--bdr2);}

/* ══ FOOTER ══ */
.footer{text-align:center;padding:28px;font-size:11px;color:var(--tx3);font-family:var(--mono);border-top:1px solid var(--bdr);margin-top:20px;}
.footer strong{color:var(--gold);}

/* ══ DESKTOP OPTIMIZATIONS ══ */
@media(min-width:1200px){
  .content{padding:0 32px 48px;}
  .hdr{padding:16px 32px;}
  .ctrl-wrap{padding:24px 32px;}
  .quick{padding:14px 32px 20px;}
  
  .ind-grid{grid-template-columns:repeat(4,1fr);}
  .agg-grid{grid-template-columns:repeat(6,1fr);}
  .rec-grid{grid-template-columns:repeat(4,1fr);}
  .ph-stats{grid-template-columns:repeat(4,1fr);}
  
  .chart-tv{height:650px;}
  
  .signal-card{padding:32px;}
  .sig-label{font-size:30px;}
  .sig-num{font-size:48px;}
